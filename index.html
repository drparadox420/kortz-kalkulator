<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUDBUILD_V5_ALPHA_OFFICIAL - Heist Companion</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- STICKY TOP HUD: BUYER'S REQUEST TRACKER -->
    <header id="top-hud">
        <div id="special-list-container">
            <h3>BUYER'S REQUEST TARGETS</h3>
            <ul id="br-items-list">
                <li class="placeholder">No Buyer's Request items selected</li>
            </ul>
            <div id="br-status-note"></div>
        </div>
    </header>

    <main class="container">
        <!-- VAN SELECTOR CONTROL -->
        <section class="card van-card">
            <h2>Loading Bay Van Status</h2>
            <select id="state-van" onchange="handleVanDropdownStateChange()">
                <option value="not-present">Not Present (0% Capacity)</option>
                <option value="baseline" selected>Baseline (Auto 30% Loot Space)</option>
                <option value="manual-override">Manual Override</option>
            </select>
        </section>

        <!-- ROUTE ENTRY POINT SELECTOR -->
        <section class="card route-card">
            <h2>Pre-Mission Entry Strategy</h2>
            <p class="subtitle">Default route baseline loaded. Custom reordering available in Results Manifest below.</p>
        </section>

        <!-- RESULTS MANIFEST SECTION -->
        <section id="results-manifest" class="card manifest-card">
            <h2>TACTICAL RESULTS MANIFEST</h2>
            <button id="btn-execute" onclick="executeMasterMathMatrix()">⚡ EXECUTE MASTER MATH MATRIX</button>

            <div id="advisory-engine-output"></div>

            <!-- ZONE-BY-ZONE MANIFEST CONTAINER -->
            <div id="zone-manifest-container">
                <!-- Zone cards with ▲/▼ reorder controls will dynamically render here -->
            </div>
        </section>
    </main>

    <!-- LINK EXTERNAL SCRIPT -->
    <script src="script.js"></script>
</body>
</html>
